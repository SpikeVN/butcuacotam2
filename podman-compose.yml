services:
  backend:
    build:
      context: ./backend
      dockerfile: Containerfile
    container_name: butbase-backend
    restart: always
    ports:
      - "127.0.0.1:6942:6942"
    volumes:
      - ./backend/db_data:/opt/butbase/db_data
      - ./backend/logs:/opt/butbase/logs
    environment:
      - JWT_SECRET_KEY=!!!REPLACEME!!!
      - DEBUG=False

  sqlite-web:
    image: coleifer/sqlite-web
    container_name: butbase-sqlite-web
    restart: always
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./backend/db_data:/data
    environment:
      - SQLITE_DATABASE=database.sqlite
    command: -p 8080 -H 0.0.0.0 /data/database.sqlite

  umami-db:
    image: postgres:15-alpine
    container_name: butbase-umami-db
    restart: always
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=umami
      - POSTGRES_PASSWORD=umami_password
    volumes:
      - umami-db-data:/var/lib/postgresql/data

  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    container_name: butbase-umami
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - DATABASE_URL=postgresql://umami:umami_password@umami-db:5432/umami
      - APP_SECRET=!!!REPLACEME!!!
      - BASE_PATH=/analytics
    depends_on:
      - umami-db

volumes:
  umami-db-data:
