name: amogus

on:
  workflow_dispatch:
  push:    
    branches: ["main"]

jobs:
  deploy_frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install JS runtime
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: |
          bun install
          

      - name: build
        env:
          VITE_API_ENDPOINT: ${{ vars.VITE_API_ENDPOINT }}
          VITE_ANALYTICS_ID: ${{ vars.VITE_ANALYTICS_ID }}
          VITE_ANALYTICS_URL: ${{ vars.VITE_ANALYTICS_URL }}
          SPELLBOOK: ${{ secrets.SPELLBOOK }}
        run: |
          echo "$SPELLBOOK" > spellbook.json
          bun run build

      - name: Deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=butcuacotam
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          